<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Valentine Page</title>

<style>
body{
  margin:0;
  padding:0; 
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#ffb6c1,#ffc0cb);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
 
}

/* CARD (boundary container) */
.card{
  width:650px;
  padding:60px;
  background:#f5f5f5;
  border-radius:25px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,.25);
  position:relative;   /* IMPORTANT */
  overflow:hidden;   /* extra safety */
  margin:40px 0;
}

#myImg {
	margin:auto;
}
.icon{
  font-size:70px;
}

h1{
  margin:20px 0 60px;
}

/* YES button stays normal */
#yesBtn{
  background:crimson;
  color:white;
  border:none;
  padding:20px 60px;
  position:absolute;
  left:30%;
  margin-bottom:150px;
  top:65%;
  font-size:26px;
  border-radius:50px;
  cursor:pointer;
  box-shadow:0 5px 12px rgba(0,0,0,.2);
}

/* NO button moves inside card only */
#noBtn{
  position:absolute;
  left:55%;
  top:75%;
  background:#eee;
  color:#333;
  border:none;
  padding:20px 50px;
  font-size:20px;
  border-radius: 40px;
  cursor:pointer;
  box-shadow:0 4px 10px rgba(0,0,0,.15);
  transition:left .3s ease, top .3s ease;
}

@media (max-width: 580px) {
	body{
		padding:20px;
	}
}
</style>
</head>

<body>

<div class="card" id="card">
  <div class="icon">💖</div>
  <h1 id="text">Hey!! will you be my valentine?🐱</h1>

  <button id="yesBtn">Yes</button>
  <button id="noBtn">No</button>
  <div>
  <img id="myImg" style="display:none" width="250px" height="320px" src="https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExYmxtZ2FyczlveTZoeWJ4dDN5bTNyNGxjaWpnMDZpdnc3Y3ZxZnR1ciZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/1pAYoOu5772nekbNV3/giphy.gif">
  </div>
</div>

<script>
const card = document.getElementById("card");
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const myImage =document.getElementById("myImg");

let images =["https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExYmxtZ2FyczlveTZoeWJ4dDN5bTNyNGxjaWpnMDZpdnc3Y3ZxZnR1ciZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/1pAYoOu5772nekbNV3/giphy.gif",
"https://usagif.com/wp-content/uploads/gif-i-love-you-49.gif",
"https://usagif.com/wp-content/uploads/gif-i-love-you-7.gif"
]
noBtn.addEventListener("mouseenter", () => {

  const maxLeft = card.clientWidth - noBtn.offsetWidth;
  const maxTop  = card.clientHeight - noBtn.offsetHeight;

  const left = Math.random() * maxLeft;
  const top  = Math.random() * maxTop;

  noBtn.style.left = left + "px";
  noBtn.style.top  = top + "px";
});

yesBtn.onclick = () =>{
	myImage.style.display="block"
	yesBtn.style.display="none"
	noBtn.style.display="none"
	document.getElementById("text").innerHTML="Thank youuu! Can’t wait to meet you soooon 💖✨"

let currentIndex = 0;

  function changeImage() {
	currentIndex = (currentIndex + 1) % images.length;
    myImage.src = images[currentIndex];
  }
	
	 setInterval(changeImage, 5000);
}
</script>

</body>
</html>
